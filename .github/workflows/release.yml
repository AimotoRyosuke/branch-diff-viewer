name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: install frontend dependencies
        run: npm install

      - name: derive release asset name
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          # GitHub replaces spaces in release asset filenames with dots in the download URL.
          product_name=$(jq -r '.productName' src-tauri/tauri.conf.json | tr ' ' '.')
          echo "dmg_name=${product_name}_${version}_universal.dmg" >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target universal-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: 'Branch Diff Viewer ${{ github.ref_name }}'
          releaseBody: |
            **[⬇ Download for macOS (Universal — Intel & Apple Silicon)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.meta.outputs.dmg_name }})**

            See the Assets below for other files.
          releaseDraft: true
          prerelease: false
